<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tracker Appartements - Accès Sécurisé</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #login-screen { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        #login-screen h2 { margin-bottom: 20px; color: #333; }
        #login-screen input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #login-screen button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #main-app { display: none; width: 95%; max-width: 1800px; margin: 20px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); align-self: flex-start; }
        
        h2 { color: #333; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn-add { background: #2ecc71; color: white; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        input, select, textarea { border: 1px solid #ddd; padding: 8px; border-radius: 6px; width: 100%; outline: none; box-sizing: border-box; font-family: inherit; font-size: 0.95em; }
        textarea { resize: none; overflow: hidden; min-height: 38px; line-height: 1.4; }

        .status-pill { padding: 6px 12px; border-radius: 20px; font-size: 0.85em; cursor: pointer; display: inline-block; min-width: 120px; text-align: center; font-weight: 500; }
        .status-not-called { background: #dfe6e9; color: #636e72; }
        .status-called { background: #ffeaa7; color: #d6a000; }
        .status-written-contact { background: #81ecec; color: #008b8b; }
        .status-visited { background: #55efc4; color: #00b894; }
        .status-sent-folder { background: #d4b5de; color: #c529e9; }
        .status-accepted { background: #a4ef9c; color: #0f7d21; }
        .status-not-accepted { background: #d48080; color: #a74232; }
        .grade-select {
        font-weight: bold;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: center;
            }
        .grade-5 { background-color: #27ae60 !important; color: #ffffff !important; } 
        .grade-4 { background-color: #a2d149 !important; color: #2d4a05 !important; } 
        .grade-3 { background-color: #f1c40f !important; color: #4d3d02 !important; } 
        .grade-2 { background-color: #e67e22 !important; color: #ffffff !important; } 
        .grade-1 { background-color: #e74c3c !important; color: #ffffff !important; } 

        .delete-btn { color: #e74c3c; background: none; border: none; cursor: pointer; font-weight: bold; }
        input[type="text"] { padding: 8px; border-radius: 6px; border: 1px solid #ddd; width: 90%; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Connexion </h2>
        <input type="text" id="username" placeholder="Utilisateur">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="checkLogin()">Entrer</button>
        <p id="error-msg" style="color: red; display: none; margin-top: 10px;">Identifiants incorrects</p>
    </div>

    <div id="main-app">
        <h2>Tracker Appartements Paris 
            <div>
                <button class="btn-add" onclick="addRow()">+ Nouvel Appartement</button>
                <button onclick="logout()" style="background: #95a5a6; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; margin-left: 10px;">Déconnexion</button>
            </div>
        </h2>
        <table id="flatTable">
            <thead>
                <tr>
                    <th >Nom</th>
                    <th >Adresse</th>
                    <th >Loyer</th>
                    <th >Lien</th>
                    <th >Note</th>
                    <th >Statut</th>
                    <th >Commentaires</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
    const USERS = {
        "selemma": "poissonrouge",
    };

    function checkLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if (USERS[u] && USERS[u] === p) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.body.style.alignItems = 'flex-start';
            loadData();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function logout() {
        location.reload();
    }

    const statuses = ["Pas Appelés", "Appelés", "Contactés", "Visité", "Dossier Envoyé", "Acceptés", "Pas Acceptés"];
    const statusClasses = ["status-not-called", "status-called", "status-written-contact", "status-visited", "status-sent-folder", "status-accepted", "status-not-accepted"];

    function addRow(data = null) {
        const tbody = document.getElementById('tableBody');
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><textarea oninput="autoExpand(this); saveData()" placeholder="Ex: T2 La Chapelle (ça craint)">${data ? data.nom : ''}</textarea></td>
            <td><textarea oninput="autoExpand(this); saveData()" placeholder="96 rue des Poissonniers" value="${data ? data.adresse : ''}</textarea></td>
            <td><input type="text" oninput="saveData()" placeholder="€" value="${data ? data.loyer : ''}"></td>
            <td><input type="text" oninput="saveData()" placeholder="Lien Vers l'Annonce" value="${data ? data.lien : ''}"></td>
            <td>
                <select class="grade-select grade-default" onchange="updateGradeColor(this); saveData()">
                    <option value="0">- Note -</option>
                    <option value="5" class="grade-5">5 - Top</option>
                    <option value="4" class="grade-4">4 - Bien</option>
                    <option value="3" class="grade-3">3 - Moyen</option>
                    <option value="2" class="grade-2">2 - Bof</option>
                    <option value="1" class="grade-1">1 - Nul</option>
                </select>
            </td>
            <td><span class="status-pill status-not-called" onclick="toggleStatus(this); saveData()">Pas Appelés</span></td>
            <td><textarea oninput="autoExpand(this); saveData()" placeholder="Commentaires">${data ? data.comm : ''}</textarea></td>
            <td><button class="delete-btn" onclick="this.parentElement.parentElement.remove(); saveData()">Supprimer</button></td>
        `;
        tbody.prepend(row);
        const tx = row.querySelector('textarea');
        if(data) autoExpand(tx);

        if (data) {
            const select = row.querySelector('select');
            select.value = data.note;
            updateGradeColor(select);
            const span = row.querySelector('.status-pill');
            span.className = 'status-pill ' + (statusClasses[statuses.indexOf(data.statut)] || 'status-not-called');
        }
    }

    function updateGradeColor(select) {
    select.className = "grade-select";
        const val = select.value;
    if (val !== "0") {
        select.classList.add('grade-' + val);
    }
}
    function toggleStatus(element) {
        let currentIndex = statuses.indexOf(element.innerText);
        let nextIndex = (currentIndex + 1) % statuses.length;
        element.innerText = statuses[nextIndex];
        element.className = 'status-pill ' + statusClasses[nextIndex];
    }

    function autoExpand(field) {
        field.style.height = 'inherit';
        const height = field.scrollHeight;
        field.style.height = height + 'px';
    }

    function saveData() {
        const rows = document.querySelectorAll('#tableBody tr');
        const allData = [];
        rows.forEach(row => {
            const inputs = row.querySelectorAll('input');
            const textareas = row.querySelectorAll('textarea');
            allData.push({
                nom: textareas[0].value,
                adresse: textareas[1].value,
                loyer: inputs[0].value,
                lien: inputs[1].value,
                note: row.querySelector('select').value,
                statut: row.querySelector('.status-pill').innerText,
                comm: textareas[1].value
            });
        });
        localStorage.setItem('myApartmentsData', JSON.stringify(allData));
    }

    function loadData() {
        const saved = localStorage.getItem('myApartmentsData');
        document.getElementById('tableBody').innerHTML = "";
        if (saved) { JSON.parse(saved).reverse().forEach(item => addRow(item)); } 
        else { addRow(); }
    }
</script>
</body>
</html>
